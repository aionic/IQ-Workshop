# ============================================================================
# ci.yml — Continuous Integration for IQ Foundry Agent Lab
# Runs on push to main and pull requests
# ============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: services/api-tools

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (pyright)
        run: uv run pyright app/

      - name: Unit tests (pytest)
        run: uv run pytest -v --tb=short

  bicep-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify Azure CLI available
        run: az version
        working-directory: .

      - name: Install Bicep CLI
        run: az bicep install
        working-directory: .

      - name: Build Bicep template
        run: az bicep build --file infra/bicep/main.bicep
        working-directory: .

  openapi-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli

      - name: Lint OpenAPI spec
        run: spectral lint foundry/tools.openapi.json -r .spectral.yaml
        working-directory: .

  smoke-test:
    runs-on: ubuntu-latest
    needs: [lint-and-test, openapi-lint, bicep-build]

    steps:
      - uses: actions/checkout@v4

      - name: Start local stack
        run: docker compose up -d --build
        working-directory: .

      - name: Wait for API health
        shell: bash
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              echo "API is reachable"
              exit 0
            fi
            sleep 5
          done
          echo "Timed out waiting for API health"
          docker compose logs
          exit 1
        working-directory: .

      - name: Run endpoint smoke test
        shell: bash
        run: bash ./scripts/smoke-test.sh -b http://localhost:8000
        working-directory: .

      - name: Dump docker logs on failure
        if: failure()
        run: docker compose logs
        working-directory: .

      - name: Tear down local stack
        if: always()
        run: docker compose down -v
        working-directory: .
