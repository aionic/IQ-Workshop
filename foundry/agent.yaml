# ============================================================================
# agent.yaml — Foundry Prompt Agent Definition
# IQ Foundry Agent Lab — Network Operations Triage Agent
# ============================================================================
#
# Architecture: Prompt Agent (LLM in Foundry) + MCP Tool Service (Container Apps)
# The agent runs gpt-4.1-mini via AI Foundry. Tools are exposed via an MCP server
# co-hosted on the FastAPI tool service at /mcp (Streamable HTTP transport).
#
# The Foundry Agent Service connects directly to the MCP server — no client-side
# tool loop needed for tool execution. The agent is registered with McpTool
# (azure.ai.agents.models) pointing at the /mcp endpoint.
#
# Legacy mode: FunctionTool registration + client-side HTTP dispatch is still
# available via `--legacy` flag on create_agent.py / chat_agent.py.
#
# Register via SDK:
#   uv run scripts/create_agent.py                    # MCP mode (default)
#   uv run scripts/create_agent.py --legacy           # Legacy FunctionTool mode
#
# Run interactively:
#   uv run scripts/chat_agent.py                      # MCP mode (default)
#   uv run scripts/chat_agent.py --legacy             # Legacy mode
#
# References:
#   - Foundry Agent Service: https://learn.microsoft.com/azure/ai-foundry/agents/overview
#   - MCP Tools: https://learn.microsoft.com/azure/ai-foundry/agents/how-to/tools/mcp
#   - Function calling (legacy): https://learn.microsoft.com/azure/ai-foundry/agents/how-to/tools/function-calling
# ============================================================================

name: iq-triage-agent
description: >
  IQ Network Operations triage agent. Reads structured ticket/anomaly/device data,
  produces terse triage summaries grounded in specific fields, proposes safe remediation
  actions, requires human approval before execution, and logs every decision.

# Agent definition — prompt agent (LLM-backed, MCP tool service on ACA)
template:
  kind: prompt
  model: gpt-4.1-mini
  temperature: 0.3

# ---------------------------------------------------------------------------
# MCP Tool Integration (default — preferred)
# ---------------------------------------------------------------------------
# The agent connects to the MCP server co-hosted on the tool service Container App.
# Registration in create_agent.py:
#   McpTool(server_label="iq-tools", server_url="<TOOL_SERVICE_URL>/mcp")
#
# The MCP server exposes 4 tools (defined in app/mcp_server.py):
#   - query_ticket_context  — Query ticket + anomaly + device data
#   - request_approval      — Request approval for a proposed remediation
#   - execute_remediation   — Execute an approved remediation action
#   - post_teams_summary    — Post a summary to Microsoft Teams
#
# Approval mode: require_approval="always" (human-in-the-loop governance)
# Transport: Streamable HTTP (stateless_http=True, json_response=True)
mcp:
  server_label: iq-tools
  server_url: "${TOOL_SERVICE_URL}/mcp"
  require_approval: always
  tools:
    - name: query_ticket_context
      description: "Query ticket context with linked anomaly and device data."
    - name: request_approval
      description: "Request approval for a proposed remediation action."
    - name: execute_remediation
      description: "Execute an approved remediation action."
    - name: post_teams_summary
      description: "Post a remediation summary to Microsoft Teams."

# ---------------------------------------------------------------------------
# Legacy Function Tool Definitions (deprecated — use --legacy flag)
# ---------------------------------------------------------------------------
# When registered with FunctionTool, the client-side loop (chat_agent.py)
# intercepts requires_action, calls REST endpoints, and submits outputs back.
# REST endpoints at /tools/* are deprecated but remain functional.
legacy_tools:
  - type: function
    name: query_ticket_context
    description: "Query ticket context with linked anomaly and device data."
  - type: function
    name: request_approval
    description: "Request approval for a proposed remediation action."
  - type: function
    name: execute_remediation
    description: "Execute an approved remediation action."
  - type: function
    name: post_teams_summary
    description: "Post a remediation summary to Microsoft Teams."

# System instructions
instructions_file: prompts/system.md

# Deployment context (populated by deploy scripts / Bicep outputs)
# These are NOT container env vars — they're reference values for scripts.
deployment_context:
  AZURE_AI_PROJECT_ENDPOINT: "TODO: <from Bicep outputs>"
  TOOL_SERVICE_URL: "TODO: <from Bicep outputs>"
  MCP_SERVER_URL: "${TOOL_SERVICE_URL}/mcp"
  AI_MODEL_DEPLOYMENT: "gpt-4.1-mini"
