# ============================================================================
# agent.yaml — Foundry Prompt Agent Definition
# IQ Foundry Agent Lab — Network Operations Triage Agent
# ============================================================================
#
# Architecture: Prompt Agent (LLM in Foundry) + OpenAPI Tools (FastAPI on Container Apps)
# The agent runs gpt-5-mini via AI Foundry, calling tool endpoints on your Container App.
# The FastAPI tool service is deployed and managed separately on Azure Container Apps.
#
# Deploy via Foundry MCP tools:
#   foundry agent_update --projectEndpoint <endpoint> --agentName iq-triage-agent
#
# References:
#   - Foundry Agent Service: https://learn.microsoft.com/azure/ai-foundry/agents/overview
#   - Prompt Agent quickstart: https://learn.microsoft.com/azure/ai-foundry/agents/quickstarts/
# ============================================================================

name: iq-triage-agent
description: >
  IQ Network Operations triage agent. Reads structured ticket/anomaly/device data,
  produces terse triage summaries grounded in specific fields, proposes safe remediation
  actions, requires human approval before execution, and logs every decision.

# Agent definition — prompt agent (LLM-backed, not container-hosted)
template:
  kind: prompt
  model: gpt-5-mini
  temperature: 0.3

# Tool definitions — OpenAPI spec pointing to Container Apps tool service
tools:
  - type: openapi
    spec_file: tools.openapi.json
    description: "IQ Lab tool endpoints for ticket context, approval, and remediation."

# System instructions
instructions_file: prompts/system.md

# Deployment context (populated by deploy scripts / Bicep outputs)
# These are NOT container env vars — they're reference values for scripts.
deployment_context:
  AZURE_AI_PROJECT_ENDPOINT: "TODO: https://ai-iq-lab-dev.services.ai.azure.com/api/projects/iq-lab-project"
  TOOL_SERVICE_URL: "TODO: https://ca-tools-iq-lab-dev.<hash>.westus3.azurecontainerapps.io"
  AI_MODEL_DEPLOYMENT: "gpt-5-mini"
